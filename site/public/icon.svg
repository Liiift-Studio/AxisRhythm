<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="hsl(0,55%,10%)"/>

  <!-- Axis cycling: alternating tall (high axis value) and thin (low axis value) lines -->
  <!-- Represents wdth/wght axis values cycling line by line -->
  <rect x="9" y="10" width="46" height="9"  rx="4.5" fill="#f0ece3"/>
  <rect x="9" y="23" width="46" height="4"  rx="2"   fill="#f0ece3" opacity="0.6"/>
  <rect x="9" y="32" width="46" height="9"  rx="4.5" fill="#f0ece3"/>
  <rect x="9" y="45" width="46" height="4"  rx="2"   fill="#f0ece3" opacity="0.6"/>
</svg>
